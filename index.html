<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APM/PM Internship Tracker - Summer 2027</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="background-elements">
        <div class="glow-orb orb-1"></div>
        <div class="glow-orb orb-2"></div>
    </div>
    
    <div class="container">
        <header>
            <div class="header-content">
                <h1>Summer 2027 APM/PM Tracker</h1>
                <p>Stay ahead of the curve. Track application cycles for top-tier Product Management internships.</p>
            </div>
            <div class="controls">
                <div class="sort-control">
                    <label for="sortSelect">Sort by:</label>
                    <select id="sortSelect">
                        <option value="expectedOpening">Expected Opening (Earliest First)</option>
                        <option value="name">Company Name (A-Z)</option>
                    </select>
                </div>
                <div class="last-updated">
                    <span id="lastUpdatedText">Last updated: Just now</span>
                </div>
            </div>
        </header>

        <main>
            <div id="tracker-grid" class="tracker-grid">
                <!-- Cards will be dynamically injected here by script.js -->
            </div>
        </main>

        <footer>
            <p>Data is based on historical trends and may vary. Please verify on official career portals.</p>
        </footer>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
